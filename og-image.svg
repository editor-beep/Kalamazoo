<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">kalamazoo through time</title>
  <desc id="desc">A social preview image for Kalamazoo through time: the same streets, the same river, nine layers of time.</desc>
  <defs>
